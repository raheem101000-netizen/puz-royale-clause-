<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puz Royale — Multiplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;}
#hud{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:rgba(0,0,0,0.9);width:min(800px,100vw);border-radius:6px 6px 0 0;gap:12px;}
#hp-wrap{display:flex;align-items:center;gap:8px;}
#hp-bar{width:120px;height:10px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;}
#hp-fill{height:100%;background:#4CFF6C;border-radius:4px;transition:width .12s;}
#hp-txt{color:#fff;font-size:12px;}
#ammo-txt{color:#FFD700;font-size:12px;}
#alive-txt{color:rgba(255,255,255,.6);font-size:12px;}
#zone-txt{color:#FF6B6B;font-size:12px;}
#map-txt{color:#4BA8FF;font-size:12px;}
#wrap{position:relative;display:inline-block;max-width:100vw;}
canvas#c{display:block;border-radius:0 0 6px 6px;cursor:crosshair;background:#1a1a1a;max-width:100vw;height:auto;aspect-ratio:800/500;}
canvas#minimap{position:absolute;bottom:-36px;right:-36px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,0.3),0 0 12px rgba(0,0,0,0.8);display:none;}
#elim{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.elim-i{background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:3px 9px;border-radius:10px;border-left:3px solid #fff;transition:opacity .5s;}
#wait,#result{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:10;border-radius:0 0 6px 6px;}
#result{display:none;}
#wait h2,#result h2{color:#fff;font-size:18px;margin-bottom:12px;}
#wait-list{display:flex;flex-direction:column;gap:8px;min-width:200px;margin-bottom:14px;}
.wl-i{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:6px;}
.wl-d{width:10px;height:10px;border-radius:50%;}
.wl-n{color:#fff;font-size:13px;}
#wait-status{color:rgba(255,255,255,.4);font-size:12px;}
#result-place{font-size:46px;font-weight:700;margin:6px 0;}
#result-sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:18px;}
#again{background:#4CFF6C;color:#04210d;border:none;border-radius:6px;padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div id="hud">
  <div id="hp-wrap">
    <div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
    <div id="hp-txt">100</div>
  </div>
  <div id="ammo-txt">Ammo: 30/30</div>
  <div id="alive-txt">—</div>
  <div id="zone-txt">—</div>
  <div id="map-txt">—</div>
</div>
<div id="wrap">
  <canvas id="c" width="800" height="500"></canvas>
  <canvas id="minimap" width="140" height="140"></canvas>
  <div id="elim"></div>
  <div id="wait">
    <h2>Waiting for players…</h2>
    <div id="wait-list"></div>
    <div id="wait-status">Connecting…</div>
  </div>
  <div id="result">
    <h2 id="result-title">Eliminated</h2>
    <div id="result-place"></div>
    <div id="result-sub"></div>
    <div id="puz-claim-form" style="display:none;text-align:center;padding:16px;width:100%;max-width:380px;font-family:system-ui;">
      <div style="font-family:'Press Start 2P',monospace;font-size:11px;color:#ffe44d;margin-bottom:6px;">$8 PRIZE</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;margin-bottom:16px;">Enter your details to claim your prize. We'll send it to your PayPal within 48 hours.</div>
      <input id="puz-name" type="text" placeholder="Full name" style="width:100%;padding:11px;margin-bottom:9px;background:#111;border:2px solid #ffe44d;color:#fff;font-size:14px;box-sizing:border-box;"/>
      <input id="puz-paypal" type="email" placeholder="PayPal email" style="width:100%;padding:11px;margin-bottom:9px;background:#111;border:2px solid #ffe44d;color:#fff;font-size:14px;box-sizing:border-box;"/>
      <input id="puz-contact" type="email" placeholder="Contact email" style="width:100%;padding:11px;margin-bottom:9px;background:#111;border:2px solid #ffe44d;color:#fff;font-size:14px;box-sizing:border-box;"/>
      <textarea id="puz-notes" placeholder="No PayPal? Questions? (optional)" style="width:100%;padding:11px;margin-bottom:14px;background:#111;border:2px solid rgba(255,255,255,0.15);color:#fff;font-size:14px;box-sizing:border-box;height:68px;resize:none;"></textarea>
      <button id="puz-claim-btn" style="width:100%;padding:13px;background:#ffe44d;color:#000;font-family:'Press Start 2P',monospace;font-size:9px;border:none;cursor:pointer;letter-spacing:1px;">► CLAIM MY PRIZE</button>
      <div id="puz-claim-success" style="display:none;margin-top:14px;font-size:13px;color:#22ff6e;line-height:1.6;">✓ Claim received! Your prize will be sent to your PayPal within 48 hours.</div>
      <div id="puz-claim-error" style="display:none;margin-top:10px;font-size:12px;color:#ff4757;"></div>
    </div>
    <button id="again" onclick="location.href='/rooms'">Back to Lobby</button>
  </div>
</div>

<script src="/colyseus-adapter.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');
const CW = 800, CH = 500;

// Map/world dimensions — set from server on puz:started
let WW = 1300, WH = 800, TILE = 34;
let walls = [];
let needsCamera = true;
let camX = 0, camY = 0;

// Zone state (circular)
let zoneX = 0, zoneY = 0, zoneR = 1e9;
let maxZoneR = 1e9;
let gameStarted = false;

let serverPlayers = [];
let serverBullets = [];
let renderPlayers = {};
let aliveCount = 0;
let inputSeq = 0;
let pendingInputs = [];

const urlP = new URLSearchParams(location.search);
const roomId = urlP.get('room') || '';
let myId = null;
const myName = localStorage.getItem('puz_name') || ('Player' + Math.floor(Math.random() * 1000));
const myColor = ['#4CFF6C','#FF4444','#FFD700','#4BA8FF','#FF8C00','#DA70D6','#00CED1','#FF69B4'][Math.floor(Math.random() * 8)];

let keys = {}, mouseX = CW/2, mouseY = CH/2, mouseDown = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (CW / r.width);
  mouseY = (e.clientY - r.top)  * (CH / r.height);
});
document.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
document.addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('touchstart', e => { mouseDown = true; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend',   e => { mouseDown = false; });
canvas.addEventListener('touchmove', e => {
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouseX = (t.clientX - r.left) * (CW / r.width);
  mouseY = (t.clientY - r.top)  * (CH / r.height);
  e.preventDefault();
}, { passive: false });

function me() { return serverPlayers.find(p => p.id === myId); }
function toScreen(wx, wy) { return { x: wx - camX, y: wy - camY }; }

function updateCamera() {
  const p = me();
  if (!p) return;
  if (needsCamera) {
    camX = p.x - CW/2;
    camY = p.y - CH/2;
    camX = Math.max(0, Math.min(WW - CW, camX));
    camY = Math.max(0, Math.min(WH - CH, camY));
  } else {
    // Small map: center it statically
    camX = (WW - CW) / 2;
    camY = (WH - CH) / 2;
  }
}

function drawWorld() {
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle = '#222';
  for (let x = (-camX % TILE + TILE) % TILE; x < CW; x += TILE)
    for (let y = (-camY % TILE + TILE) % TILE; y < CH; y += TILE)
      if ((Math.floor((x+camX)/TILE) + Math.floor((y+camY)/TILE)) % 2 === 0)
        ctx.fillRect(x, y, TILE, TILE);

  // Zone (circular)
  if (zoneR < maxZoneR * 0.98) {
    const sc = toScreen(zoneX, zoneY);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, CW, CH);
    ctx.arc(sc.x, sc.y, zoneR, 0, Math.PI*2, true);
    ctx.fillStyle = 'rgba(255,40,40,0.25)'; ctx.fill('evenodd'); ctx.restore();
    ctx.beginPath(); ctx.arc(sc.x, sc.y, zoneR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,60,60,0.9)'; ctx.lineWidth = 2; ctx.stroke();
  }

  walls.forEach(w => {
    const s = toScreen(w.x, w.y);
    if (s.x+w.w<0 || s.x>CW || s.y+w.h<0 || s.y>CH) return;
    ctx.fillStyle = '#8B0000'; ctx.fillRect(s.x, s.y, w.w, w.h);
    ctx.fillStyle = 'rgba(255,60,60,0.12)'; ctx.fillRect(s.x, s.y, w.w, 5);
    ctx.strokeStyle = '#600000'; ctx.lineWidth = 0.5; ctx.strokeRect(s.x, s.y, w.w, w.h);
  });
}

function drawPlayers() {
  serverPlayers.forEach(p => {
    if (!p.alive) return;
    const rp = renderPlayers[p.id] || (renderPlayers[p.id] = { x: p.x, y: p.y });
    rp.x += (p.x - rp.x) * 0.6;
    rp.y += (p.y - rp.y) * 0.6;
    const s = toScreen(rp.x, rp.y);
    if (s.x < -30 || s.x > CW+30 || s.y < -30 || s.y > CH+30) return;
    const isMe = p.id === myId;
    const r = p.r || 10;
    ctx.save(); ctx.translate(s.x, s.y);
    ctx.beginPath(); ctx.arc(0,0,r+3,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=p.color||'#fff'; ctx.fill();
    if (isMe) { ctx.beginPath(); ctx.arc(0,0,r+2,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke(); }
    const gx=Math.cos(p.angle||0)*(r+6), gy=Math.sin(p.angle||0)*(r+6);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(gx,gy);
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    const hw=r*2.5, hx=-hw/2, hy=-r-10;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(hx,hy,hw,5);
    const pct=Math.max(0,(p.hp||0)/(p.maxHp||100));
    ctx.fillStyle=pct>0.5?'#4CFF6C':pct>0.25?'#FFD700':'#FF4444';
    ctx.fillRect(hx,hy,hw*pct,5);
    ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font='9px system-ui'; ctx.textAlign='center';
    ctx.fillText(p.name||'', 0, -r-14);
    ctx.restore();
  });
}

function drawBullets() {
  serverBullets.forEach(b => {
    const s = toScreen(b.x, b.y);
    if (s.x<-10||s.x>CW+10||s.y<-10||s.y>CH+10) return;
    ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2);
    ctx.fillStyle = b.color||'#fff'; ctx.fill();
    if (b.vx !== undefined) {
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x-b.vx*3, s.y-b.vy*3);
      ctx.strokeStyle = (b.color||'#fff')+'88'; ctx.lineWidth=2; ctx.stroke();
    }
  });
}

function drawMinimap() {
  if (!needsCamera) return;
  const mmW=mm.width, mmH=mm.height, mmCX=mmW/2, mmCY=mmH/2;
  const p = me();
  const px = p ? p.x : WW/2, py = p ? p.y : WH/2;
  const scX=mmW/WW, scY=mmH/WH;
  const offX=mmCX-px*scX, offY=mmCY-py*scY;
  const toX = wx => wx*scX+offX, toY = wy => wy*scY+offY;

  mctx.save();
  mctx.beginPath(); mctx.arc(mmCX,mmCY,mmCX-1,0,Math.PI*2); mctx.clip();
  mctx.fillStyle='rgba(10,10,10,0.9)'; mctx.fillRect(0,0,mmW,mmH);

  mctx.fillStyle='rgba(139,0,0,0.8)';
  walls.forEach(w => { mctx.fillRect(toX(w.x),toY(w.y),Math.max(1.5,w.w*scX),Math.max(1.5,w.h*scY)); });

  if (zoneR < maxZoneR * 0.98) {
    const zx=toX(zoneX), zy=toY(zoneY), zr=zoneR*Math.min(scX,scY);
    mctx.fillStyle='rgba(255,40,40,0.2)'; mctx.fillRect(0,0,mmW,mmH);
    mctx.globalCompositeOperation='destination-out';
    mctx.beginPath(); mctx.arc(zx,zy,zr,0,Math.PI*2); mctx.fillStyle='rgba(0,0,0,1)'; mctx.fill();
    mctx.globalCompositeOperation='source-over';
    mctx.beginPath(); mctx.arc(zx,zy,zr,0,Math.PI*2);
    mctx.strokeStyle='rgba(255,60,60,0.9)'; mctx.lineWidth=1.5; mctx.stroke();
  }

  // Viewport rect
  mctx.strokeStyle='rgba(255,255,255,0.25)'; mctx.lineWidth=0.5; mctx.setLineDash([2,2]);
  mctx.strokeRect(toX(camX),toY(camY),CW*scX,CH*scY); mctx.setLineDash([]);

  serverPlayers.forEach(sp => {
    if (!sp.alive) return;
    const bx=toX(sp.x), by=toY(sp.y);
    const offScreen = sp.x<camX||sp.x>camX+CW||sp.y<camY||sp.y>camY+CH;
    mctx.beginPath(); mctx.arc(bx,by,offScreen?4:2.5,0,Math.PI*2);
    mctx.fillStyle = sp.id===myId ? '#4CFF6C' : sp.color;
    mctx.fill();
    if (offScreen) { mctx.strokeStyle='rgba(255,255,255,0.6)'; mctx.lineWidth=1; mctx.stroke(); }
  });

  // Player dot + aim line
  if (p) {
    mctx.beginPath(); mctx.arc(mmCX,mmCY,4,0,Math.PI*2); mctx.fillStyle='#4CFF6C'; mctx.fill();
    mctx.strokeStyle='#fff'; mctx.lineWidth=1.5; mctx.stroke();
    const pdx=Math.cos(p.angle||0)*7, pdy=Math.sin(p.angle||0)*7;
    mctx.beginPath(); mctx.moveTo(mmCX,mmCY); mctx.lineTo(mmCX+pdx,mmCY+pdy);
    mctx.strokeStyle='#fff'; mctx.lineWidth=2; mctx.stroke();
  }
  mctx.restore();
  mctx.beginPath(); mctx.arc(mmCX,mmCY,mmCX-1,0,Math.PI*2);
  mctx.strokeStyle='rgba(255,255,255,0.35)'; mctx.lineWidth=2; mctx.stroke();
}

let lastInputSent = '';
function maybeSendInput() {
  if (!gameStarted) return;
  const p = me();
  if (!p || !p.alive) return;
  const worldMouseX = mouseX + camX, worldMouseY = mouseY + camY;
  const angle = Math.atan2(worldMouseY - p.y, worldMouseX - p.x);
  const input = {
    up:    !!(keys['ArrowUp']    || keys['KeyW']),
    down:  !!(keys['ArrowDown']  || keys['KeyS']),
    left:  !!(keys['ArrowLeft']  || keys['KeyA']),
    right: !!(keys['ArrowRight'] || keys['KeyD']),
    angle, shooting: mouseDown, reload: !!(keys['KeyR'])
  };
  const key = JSON.stringify(input);
  if (key === lastInputSent) return;
  lastInputSent = key;
  inputSeq++;
  pendingInputs.push({ seq: inputSeq, input });
  socket.emit('puz:input', { roomId, input, seq: inputSeq });
}

function draw() {
  maybeSendInput();
  updateCamera();
  drawWorld();
  drawPlayers();
  drawBullets();
  drawMinimap();
  requestAnimationFrame(draw);
}

function updateHUD() {
  const p = me();
  if (!p) return;
  const hp = Math.max(0, Math.round(p.hp||0));
  document.getElementById('hp-fill').style.width = hp + '%';
  document.getElementById('hp-fill').style.background = hp>50?'#4CFF6C':hp>25?'#FFD700':'#FF4444';
  document.getElementById('hp-txt').textContent = hp;
  document.getElementById('ammo-txt').textContent = p.reloading ? 'Reloading…' : 'Ammo: '+(p.ammo||0)+'/'+(p.maxAmmo||30);
}

function addElim(name, color) {
  const feed = document.getElementById('elim');
  const el = document.createElement('div');
  el.className = 'elim-i'; el.style.borderLeftColor = color||'#fff';
  el.textContent = (name||'Player') + ' eliminated';
  feed.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 3000);
}

function showResult(place, total) {
  document.getElementById('wait').style.display = 'none';
  const suff = place===1?'st':place===2?'nd':place===3?'rd':'th';
  document.getElementById('result-title').textContent = place===1?'Winner!':'Eliminated';
  document.getElementById('result-title').style.color = place===1?'#FFD700':'#FF4444';
  document.getElementById('result-place').textContent = place + suff;
  document.getElementById('result-place').style.color = place===1?'#FFD700':'#fff';
  document.getElementById('result-sub').textContent = 'out of ' + (total||serverPlayers.length) + ' players';
  document.getElementById('result').style.display = 'flex';
}

// ── Colyseus (via adapter) ─────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  myId = socket.id;
  socket.emit('puz:join', { roomId, name: myName, color: myColor });
  document.getElementById('wait-status').textContent = 'Joined — waiting for host to start…';
  setTimeout(() => socket.emit('puz:start', { roomId }), 700);
});

socket.on('puz:lobby', ({ players, hostId }) => {
  const list = document.getElementById('wait-list');
  list.innerHTML = players.map(p => `
    <div class="wl-i">
      <div class="wl-d" style="background:${p.color}"></div>
      <span class="wl-n">${esc(p.name)}${p.id===hostId?' 👑':''}</span>
    </div>
  `).join('');
  document.getElementById('wait-status').textContent =
    players.length + ' player' + (players.length===1?'':'s') + ' in room';
});

socket.on('puz:started', data => {
  if (data.walls) walls = data.walls;
  if (data.WW) { WW = data.WW; WH = data.WH; TILE = data.TILE; }
  if (data.zoneX !== undefined) { zoneX = data.zoneX; zoneY = data.zoneY; zoneR = data.zoneR; }
  maxZoneR = Math.sqrt(WW*WW + WH*WH)/2 + 100;
  needsCamera = (WW > CW || WH > CH);
  mm.style.display = needsCamera ? 'block' : 'none';
  if (!needsCamera) { camX = (WW-CW)/2; camY = (WH-CH)/2; }
  document.getElementById('map-txt').textContent = WW+'×'+WH;
  gameStarted = true;
  document.getElementById('wait').style.display = 'none';
});

socket.on('puz:state', state => {
  const incoming = state.players || [];
  incoming.forEach(p => {
    if (!renderPlayers[p.id]) renderPlayers[p.id] = { x: p.x, y: p.y };
  });
  serverPlayers = incoming;
  serverBullets = state.bullets || [];
  if (state.zoneX !== undefined) { zoneX=state.zoneX; zoneY=state.zoneY; zoneR=state.zoneR; }
  aliveCount = state.aliveCount || incoming.filter(p=>p.alive).length;
  if (!gameStarted) { gameStarted=true; document.getElementById('wait').style.display='none'; }
  updateHUD();
  document.getElementById('alive-txt').textContent = aliveCount + ' alive';
  Object.keys(renderPlayers).forEach(id => {
    if (!incoming.find(p => p.id===id)) delete renderPlayers[id];
  });
  const myState = incoming.find(p => p.id === myId);
  if (myState && typeof myState.lastSeq === 'number') {
    pendingInputs = pendingInputs.filter(pi => pi.seq > myState.lastSeq);
  }
});

socket.on('puz:zone', ({ zoneX: zx, zoneY: zy, zoneR: zr, timer, shrinking }) => {
  if (zx !== undefined) { zoneX=zx; zoneY=zy; zoneR=zr; }
  document.getElementById('zone-txt').textContent =
    shrinking ? 'Zone closing!' : 'Zone: ' + Math.max(0,timer||0) + 's';
});

socket.on('puz:kill', ({ name, color }) => addElim(name, color));

socket.on('puz:end', ({ winnerId, total }) => {
  showResult(winnerId===myId ? 1 : 2, total);
});

socket.on('payout', (data) => {
  document.getElementById('puz-claim-form').style.display = 'block';
  document.getElementById('again').style.display = 'none';
  document.getElementById('puz-claim-btn').onclick = async function() {
    const name    = (document.getElementById('puz-name').value || '').trim();
    const paypal  = (document.getElementById('puz-paypal').value || '').trim();
    const contact = (document.getElementById('puz-contact').value || '').trim();
    const notes   = (document.getElementById('puz-notes').value || '').trim();
    const errEl   = document.getElementById('puz-claim-error');
    errEl.style.display = 'none';
    if (!name) { errEl.style.display='block'; errEl.textContent='Please enter your full name'; return; }
    if (!paypal && !notes) { errEl.style.display='block'; errEl.textContent='Please enter your PayPal email or leave a note'; return; }
    const btn = document.getElementById('puz-claim-btn');
    btn.textContent = 'SUBMITTING...'; btn.disabled = true;
    try {
      const resp = await fetch('https://puz-royale-clause-1.onrender.com/submit-prize-claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ winner_name: name, paypal_email: paypal, contact_email: contact, notes, game: data.game, prize_amount: data.prize_amount })
      });
      const result = await resp.json();
      if (result.success) {
        document.getElementById('puz-claim-success').style.display = 'block';
        btn.style.display = 'none';
      } else { throw new Error('failed'); }
    } catch(e) {
      btn.textContent = '► CLAIM MY PRIZE'; btn.disabled = false;
      errEl.style.display = 'block'; errEl.textContent = 'Something went wrong. Please try again.';
    }
  };
});


function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

requestAnimationFrame(draw);
</script>
