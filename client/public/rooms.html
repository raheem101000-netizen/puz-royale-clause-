<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puz Royale — Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:#080808;color:#fff;min-height:100vh;}
.page{max-width:1000px;margin:0 auto;padding:24px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.logo{font-family:'Press Start 2P',monospace;font-size:14px;color:#FF3232;text-shadow:2px 2px 0 #7a0000;text-decoration:none;}
.header-right{display:flex;gap:10px;align-items:center;}
.name-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 14px;color:#fff;font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;width:160px;}
.name-input::placeholder{color:rgba(255,255,255,0.3);}
.btn{padding:9px 18px;border-radius:8px;border:none;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-red{background:#FF3232;color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12);}
.btn-sm{padding:6px 14px;font-size:12px;}
.layout{display:grid;grid-template-columns:1fr 380px;gap:20px;}
.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow:hidden;}
.panel-head{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.room-list{min-height:200px;}
.room-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .1s;}
.room-row:hover{background:rgba(255,50,50,0.06);}
.room-row:last-child{border-bottom:none;}
.room-name{font-weight:600;font-size:14px;}
.room-meta{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.empty-msg{padding:40px 20px;text-align:center;color:rgba(255,255,255,0.25);font-size:13px;}
.detail{display:none;}
.detail.visible{display:flex;flex-direction:column;gap:12px;}
.player-list{padding:12px 0;}
.player-row{display:flex;align-items:center;gap:12px;padding:8px 18px;}
.player-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.player-name{font-size:14px;font-weight:500;flex:1;}
.player-tag{font-size:11px;padding:2px 8px;border-radius:10px;}
.tag-ready{background:rgba(76,255,108,0.15);color:#4CFF6C;border:1px solid rgba(76,255,108,0.3);}
.tag-host{background:rgba(255,180,0,0.12);color:#FFB400;border:1px solid rgba(255,180,0,0.25);}
.tag-waiting{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);}
.chat-box{height:140px;overflow-y:auto;padding:10px 18px;display:flex;flex-direction:column;gap:6px;border-top:1px solid rgba(255,255,255,0.07);}
.chat-msg{font-size:12px;line-height:1.4;}
.chat-author{font-weight:700;color:#FF3232;}
.chat-input-row{display:flex;gap:8px;padding:10px 18px;border-top:1px solid rgba(255,255,255,0.07);}
.chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 12px;color:#fff;font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;}
.chat-input::placeholder{color:rgba(255,255,255,0.3);}
.action-bar{display:flex;gap:8px;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);}
.btn-ready{flex:1;padding:12px;font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .15s;background:rgba(255,50,50,0.15);color:#FF5555;border:2px solid rgba(255,50,50,0.3);}
.btn-ready.active{background:#4CFF6C;color:#020818;border-color:#4CFF6C;}
.btn-ready:disabled{opacity:.4;cursor:not-allowed;}
.btn-start{padding:12px 20px;font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:700;border:none;border-radius:8px;cursor:pointer;background:#FF3232;color:#fff;display:none;}
.btn-start.visible{display:block;}
.btn-start:disabled{opacity:.4;cursor:not-allowed;}
.error-msg{font-size:12px;color:#FF5555;min-height:16px;margin:0 18px 10px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-bg.open{display:flex;}
.modal{background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:28px;width:100%;max-width:380px;}
.modal h3{font-family:'Press Start 2P',monospace;font-size:11px;color:#FF3232;margin-bottom:20px;letter-spacing:1px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;letter-spacing:.5px;}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;}
.field input::placeholder{color:rgba(255,255,255,0.25);}
.toggle-row{display:flex;gap:8px;margin-bottom:14px;}
.toggle-btn{flex:1;padding:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.4);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.toggle-btn.active{background:rgba(255,50,50,0.2);border-color:rgba(255,50,50,0.5);color:#FF5555;}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.error-inline{font-size:12px;color:#FF5555;min-height:16px;margin-top:6px;}
.countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px;}
.countdown-overlay.show{display:flex;}
.countdown-num{font-family:'Press Start 2P',monospace;font-size:72px;color:#FF3232;text-shadow:4px 4px 0 #7a0000;}
.countdown-label{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:2px;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <a class="logo" href="/">PUZ ROYALE</a>
    <div class="header-right">
      <input class="name-input" id="my-name" type="text" placeholder="Your name" maxlength="16">
      <button class="btn btn-red btn-sm" onclick="openJoinModal()">Join with Code</button>
      <button class="btn btn-ghost btn-sm" onclick="openCreateModal()">+ Create</button>
    </div>
  </div>
  <div class="layout">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Public Rooms</span>
        <span id="live-dot" style="font-size:10px;color:rgba(76,255,108,0.5);">● LIVE</span>
      </div>
      <div class="room-list" id="room-list">
        <div class="empty-msg">Connecting…</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title" id="detail-title">Room</span>
        <button class="btn btn-ghost btn-sm" id="leave-btn" onclick="leaveRoom()" style="display:none;">Leave</button>
      </div>
      <div id="no-room-msg" style="padding:40px 20px;text-align:center;color:rgba(255,255,255,0.25);font-size:13px;">
        Join or create a room to start
      </div>
      <div class="detail" id="room-detail">
        <div class="player-list" id="player-list"></div>
        <div id="share-section" style="display:none;margin:0 18px 12px;">
          <div style="font-size:10px;color:rgba(100,180,255,0.5);letter-spacing:2px;margin-bottom:8px;">INVITE FRIENDS</div>
          <div style="display:flex;gap:8px;">
            <input id="share-link" readonly style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px;color:#fff;font-size:11px;">
            <button onclick="copyLink()" style="background:#4ab8ff;color:#020818;border:none;border-radius:4px;padding:8px 12px;font-size:12px;cursor:pointer;">COPY</button>
          </div>
        </div>
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Say something..." maxlength="120" onkeydown="chatKeydown(event)">
          <button class="btn btn-ghost btn-sm" onclick="sendChat()">Send</button>
        </div>
        <div id="map-size-row" style="display:none;padding:0 18px 10px;">
          <label style="display:block;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:6px;">MAP SIZE</label>
          <select id="map-size-sel" style="background:#1a1a1a;color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Space Grotesk',sans-serif;width:100%;outline:none;cursor:pointer;">
          </select>
        </div>
        <div class="action-bar">
          <button class="btn-ready" id="ready-btn" onclick="clickReady()">Ready Up</button>
          <button class="btn-start" id="start-btn" onclick="clickStart()">▶ Start</button>
        </div>
        <div class="error-msg" id="room-error"></div>
      </div>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-bg" id="create-modal">
  <div class="modal">
    <h3>CREATE ROOM</h3>
    <div class="field"><label>ROOM NAME</label><input id="c-name" placeholder="e.g. Epic Battle" maxlength="24"></div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="c-pub" onclick="setType('public')">Public</button>
      <button class="toggle-btn" id="c-priv" onclick="setType('private')">Private</button>
    </div>
    <div class="field" id="c-pass-field" style="display:none;"><label>PASSWORD</label><input id="c-pass" placeholder="Room password" maxlength="20"></div>
    <div class="error-inline" id="c-error"></div>
    <div class="modal-btns">
      <button class="btn btn-red" style="flex:1;" onclick="createRoom()">Create</button>
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
    </div>
  </div>
</div>

<!-- Join Private Modal -->
<div class="modal-bg" id="join-modal">
  <div class="modal">
    <h3>JOIN PRIVATE ROOM</h3>
    <div class="field"><label>ROOM ID</label><input id="j-id" placeholder="Paste room ID"></div>
    <div class="field"><label>PASSWORD (if required)</label><input id="j-pass" placeholder="Leave blank if none"></div>
    <div class="error-inline" id="j-error"></div>
    <div class="modal-btns">
      <button class="btn btn-red" style="flex:1;" onclick="joinPrivate()">Join</button>
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
    </div>
  </div>
</div>

<!-- Countdown Overlay -->
<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
  <div class="countdown-label">GAME STARTING...</div>
</div>

<!-- Load Colyseus SDK directly (copied at build time) -->
<script src="/colyseus-sdk.js"></script>
<script>
const devMode = new URLSearchParams(window.location.search).get('dev') === 'MEDIATEST';
const COLORS = ['#4CFF6C','#FF4444','#FFD700','#4BA8FF','#FF8C00','#DA70D6','#00CED1','#FF69B4'];
const MAP_LABELS = {
  2:'2p — 600×400',3:'3p — 700×500',4:'4p — 800×500',
  5:'5p — 900×600',6:'6p — 1100×700',7:'7p — 1200×800',8:'8p — 1300×800',
  9:'9p — 1400×900',10:'10p — 1600×1000',11:'11p — 1700×1000',12:'12p — 1800×1100',
  13:'13p — 1800×1100',14:'14p — 1900×1200',15:'15p — 2000×1200',16:'16p — 2000×1300'
};
(function(){
  const sel = document.getElementById('map-size-sel');
  for(let p=2;p<=16;p++){
    const o=document.createElement('option');
    o.value=p; o.textContent=MAP_LABELS[p]; if(p===8) o.selected=true;
    sel.appendChild(o);
  }
})();
let myName = localStorage.getItem('puz_name') || ('Player' + Math.floor(Math.random() * 1000));
let myColor = COLORS[Math.floor(Math.random() * COLORS.length)];
let isMaster = false;
let isReady = false;
let roomType = 'public';

// Current in-room state
let gameLobbyRoom = null;
let mySessionId = null;

document.getElementById('my-name').value = myName;
document.getElementById('my-name').addEventListener('change', e => {
  myName = e.target.value.trim() || myName;
  localStorage.setItem('puz_name', myName);
});

// ── Server URL ──────────────────────────────────────────────────────────────
const serverURL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
const colyseusClient = new Colyseus.Client(serverURL);

// ── Room list: built-in Colyseus LobbyRoom (live push) ─────────────────────
// localRooms keeps the current list so +/- updates can be applied incrementally.
let localRooms = [];

async function connectToLobby() {
  try {
    const lobbyRoom = await colyseusClient.joinOrCreate('lobby');

    // Full list on join
    lobbyRoom.onMessage('rooms', (rooms) => {
      localRooms = rooms;
      renderRoomList(localRooms);
    });

    // Room added or updated (data = [roomId, roomData])
    lobbyRoom.onMessage('+', ([roomId, data]) => {
      const idx = localRooms.findIndex(r => r.roomId === roomId);
      if (idx === -1) {
        localRooms.push({ roomId, ...data });
      } else {
        localRooms[idx] = { roomId, ...data };
      }
      renderRoomList(localRooms);
    });

    // Room removed
    lobbyRoom.onMessage('-', (roomId) => {
      localRooms = localRooms.filter(r => r.roomId !== roomId);
      renderRoomList(localRooms);
    });

    lobbyRoom.onLeave(() => {
      document.getElementById('live-dot').style.color = 'rgba(255,100,100,0.5)';
      document.getElementById('live-dot').textContent = '● RECONNECTING';
      setTimeout(connectToLobby, 2000);
    });
  } catch (e) {
    console.error('[lobby] connect failed', e);
    setTimeout(connectToLobby, 3000);
  }
}

connectToLobby();

// ── Room list rendering ─────────────────────────────────────────────────────
function renderRoomList(rooms) {
  const el = document.getElementById('room-list');
  const publicRooms = rooms.filter(r =>
    r.metadata &&
    r.metadata.open === true &&
    typeof r.metadata.name === 'string' &&
    r.metadata.name.length > 0 &&
    r.clients < r.maxClients
  );
  if (publicRooms.length === 0) {
    el.innerHTML = '<div class="empty-msg">No rooms yet. Create one!</div>';
    return;
  }
  el.innerHTML = publicRooms.map(r => `
    <div class="room-row">
      <div>
        <div class="room-name">${esc(r.metadata?.name || r.roomId)}</div>
        <div class="room-meta">${r.clients || 0}/${r.maxClients || 8} players</div>
      </div>
      <button class="btn btn-red btn-sm" onclick="joinRoom('${r.roomId}')">JOIN</button>
    </div>
  `).join('');
}

// ── Room management ─────────────────────────────────────────────────────────
function setType(t) {
  roomType = t;
  document.getElementById('c-pub').classList.toggle('active', t === 'public');
  document.getElementById('c-priv').classList.toggle('active', t === 'private');
  document.getElementById('c-pass-field').style.display = t === 'private' ? 'block' : 'none';
}

async function createRoom() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { document.getElementById('c-error').textContent = 'Enter a room name'; return; }
  const isPrivate = roomType === 'private';
  const password = isPrivate ? document.getElementById('c-pass').value : null;
  closeModals();
  try {
    gameLobbyRoom = await colyseusClient.create('puz_game_lobby', {
      name, open: !isPrivate, password,
      playerName: myName, color: myColor,
    });
    mySessionId = gameLobbyRoom.sessionId;
    setupGameLobbyHandlers();
  } catch (e) {
    showError('Failed to create room: ' + (e.message || e));
  }
}

async function joinRoom(roomId) {
  if (gameLobbyRoom) return;
  try {
    gameLobbyRoom = await colyseusClient.joinById(roomId, {
      playerName: myName, color: myColor,
    });
    mySessionId = gameLobbyRoom.sessionId;
    setupGameLobbyHandlers();
  } catch (e) {
    showError('Failed to join: ' + (e.message || e));
  }
}

async function joinPrivate() {
  const id = document.getElementById('j-id').value.trim();
  if (!id) { document.getElementById('j-error').textContent = 'Enter a room ID'; return; }
  const password = document.getElementById('j-pass').value;
  if (gameLobbyRoom) return;
  try {
    gameLobbyRoom = await colyseusClient.joinById(id, {
      playerName: myName, color: myColor, password,
    });
    mySessionId = gameLobbyRoom.sessionId;
    closeModals();
    setupGameLobbyHandlers();
  } catch (e) {
    document.getElementById('j-error').textContent = 'Join failed: ' + (e.message || 'wrong password or room not found');
  }
}

function leaveRoom() {
  if (gameLobbyRoom) { gameLobbyRoom.leave(); gameLobbyRoom = null; }
  resetDetail();
}

// ── In-room event handlers ──────────────────────────────────────────────────
function setupGameLobbyHandlers() {
  const room = gameLobbyRoom;

  // Request current state now that handlers are registered.
  room.send('room:getState');

  room.onMessage('room:join', ({ room: roomData, player }) => {
    isMaster = player.master;
    renderDetail(roomData);
    document.getElementById('leave-btn').style.display = 'block';
    if (isMaster) {
      document.getElementById('share-link').value = location.origin + '/rooms?join=' + encodeURIComponent(room.roomId);
      document.getElementById('share-section').style.display = 'block';
    }
  });

  room.onMessage('room:state', (roomData) => renderDetail(roomData));

  room.onMessage('room:player:join', () => {});
  room.onMessage('room:player:leave', () => {});

  room.onMessage('room:master', ({ master }) => {
    isMaster = (master === mySessionId);
    updateStartBtn();
    if (isMaster) {
      document.getElementById('share-link').value = location.origin + '/rooms?join=' + encodeURIComponent(room.roomId);
      document.getElementById('share-section').style.display = 'block';
    }
  });

  room.onMessage('room:player:ready', ({ player }) => {
    if (player.id === mySessionId) { isReady = true; updateReadyBtn(); }
  });

  room.onMessage('room:talk', msg => appendChat(msg.player, msg.content));

  room.onMessage('room:launch:start', () => {
    const overlay = document.getElementById('countdown-overlay');
    const num = document.getElementById('countdown-num');
    overlay.classList.add('show');
    let c = 3; num.textContent = c;
    const t = setInterval(() => { c--; if (c > 0) num.textContent = c; else clearInterval(t); }, 1000);
  });

  room.onMessage('room:game:start', data => {
    const url = '/play-mp2?room=' + encodeURIComponent(data.roomId) + (devMode ? '&dev=MEDIATEST' : '');
    // Explicitly leave before navigating so onLeave fires cleanly on the server.
    // This ensures the lobby room's client count hits 0 and autoDispose fires.
    gameLobbyRoom = null; // prevent onLeave handler from calling resetDetail
    room.leave();
    window.location.href = url;
  });

  room.onMessage('room:error', ({ message }) => showError(message));

  room.onLeave(() => {
    if (gameLobbyRoom === room) {
      gameLobbyRoom = null;
      resetDetail();
    }
  });
}

// ── Detail panel ────────────────────────────────────────────────────────────
function renderDetail(room) {
  document.getElementById('no-room-msg').style.display = 'none';
  document.getElementById('room-detail').classList.add('visible');
  document.getElementById('detail-title').textContent = room.name;

  const pl = document.getElementById('player-list');
  pl.innerHTML = (room.players || []).map(p => `
    <div class="player-row">
      <div class="player-dot" style="background:${p.color}"></div>
      <div class="player-name">${esc(p.name)}</div>
      ${p.master ? '<span class="player-tag tag-host">HOST</span>' : ''}
      ${p.ready ? '<span class="player-tag tag-ready">✓ READY</span>' : '<span class="player-tag tag-waiting">waiting</span>'}
    </div>
  `).join('');

  const readyCount = (room.players || []).filter(p => p.ready).length;
  isMaster = room.master === mySessionId;
  updateReadyBtn();
  updateStartBtn(readyCount, (room.players || []).length);
}

function resetDetail() {
  isMaster = false; isReady = false;
  document.getElementById('no-room-msg').style.display = 'block';
  document.getElementById('room-detail').classList.remove('visible');
  document.getElementById('leave-btn').style.display = 'none';
  document.getElementById('detail-title').textContent = 'Room';
  document.getElementById('chat-box').innerHTML = '';
  document.getElementById('share-section').style.display = 'none';
  document.getElementById('room-error').textContent = '';
}

function updateReadyBtn() {
  const btn = document.getElementById('ready-btn');
  if (isReady) {
    btn.textContent = '✓ Ready!'; btn.classList.add('active'); btn.disabled = true;
  } else {
    btn.textContent = 'Ready Up'; btn.classList.remove('active'); btn.disabled = false;
  }
}

function updateStartBtn(readyCount, playerCount) {
  const btn = document.getElementById('start-btn');
  btn.classList.toggle('visible', isMaster);
  document.getElementById('map-size-row').style.display = isMaster ? 'block' : 'none';
  if (isMaster) {
    btn.disabled = devMode ? false : ((readyCount || 0) < 1 || (playerCount || 0) < 2);
  }
}

function clickReady() {
  if (isReady || !gameLobbyRoom) return;
  isReady = true; updateReadyBtn();
  gameLobbyRoom.send('room:ready');
}

function clickStart() {
  if (!gameLobbyRoom) return;
  const mapSize = parseInt(document.getElementById('map-size-sel').value) || 8;
  gameLobbyRoom.send('room:launch', devMode ? { dev: true, mapSize } : { mapSize });
}

// ── Chat ─────────────────────────────────────────────────────────────────────
function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !gameLobbyRoom) return;
  gameLobbyRoom.send('room:talk', { content: msg });
  input.value = '';
}
function chatKeydown(e) { if (e.key === 'Enter') sendChat(); }
function appendChat(author, content) {
  const box = document.getElementById('chat-box');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = '<span class="chat-author">' + esc(author) + '</span>: ' + esc(content);
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

// ── Modals ───────────────────────────────────────────────────────────────────
function openCreateModal() {
  document.getElementById('create-modal').classList.add('open');
  setTimeout(() => document.getElementById('c-name').focus(), 100);
}
function openJoinModal()   { document.getElementById('join-modal').classList.add('open'); }
function closeModals() {
  document.getElementById('create-modal').classList.remove('open');
  document.getElementById('join-modal').classList.remove('open');
}
document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if (e.target === m) closeModals(); }));

function copyLink() {
  const input = document.getElementById('share-link');
  navigator.clipboard.writeText(input.value).catch(() => { input.select(); document.execCommand('copy'); });
  const btn = event.target;
  btn.textContent = 'COPIED!';
  setTimeout(() => btn.textContent = 'COPY', 2000);
}

function showError(msg) {
  document.getElementById('room-error').textContent = msg;
  setTimeout(() => document.getElementById('room-error').textContent = '', 4000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Auto-join from share link ─────────────────────────────────────────────
const autoJoin = new URLSearchParams(location.search).get('join');
if (autoJoin) {
  joinRoom(autoJoin);
}
</script>
</body>
</html>
